<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>HM Calculator V6.1</title>
<style>
body{font-family:Arial,sans-serif;background:#111;color:#fff;max-width:900px;margin:auto;padding:20px}
.card{background:#1b1b1b;border:1px solid #333;border-radius:12px;padding:16px;margin-bottom:16px}
input{width:100%;padding:10px;margin:6px 0 12px;background:#222;color:#fff;border:1px solid #444;border-radius:8px;box-sizing:border-box}
button{padding:10px 14px;margin:4px;border:none;border-radius:8px;cursor:pointer}
table{width:100%;border-collapse:collapse} td,th{padding:8px;border-bottom:1px solid #333}
</style></head><body>
<h1>HM Calculator V6.1</h1>

<div class="card">
<button onclick="resetCalc()">🔄 New Calculation</button>
<h3>Global Input</h3>
<label>Harga RMB</label><input id="rmb">
<label>ATAU Modal Langsung (IDR)</label><input id="modal">
<label>Komisi Reseller</label><br>
<button onclick="setKomisi(0)">0</button>
<button onclick="setKomisi(50000)">50K</button>
<button onclick="setKomisi(100000)">100K</button>
<button onclick="setKomisi(150000)">150K</button>
<input id="komisi" placeholder="Custom komisi (opsional)">
</div>

<div class="card">
<h3>Profit Calculator</h3>
<label>Harga Jual</label><input id="jual">
<button onclick="profit()">Hitung Profit</button>
<div id="profitResult"></div>
</div>

<div class="card">
<h3>🎯 Pricing Table</h3>
<button onclick="pricingTable()">Generate Pricing Table</button>
<div id="pricing"></div>
</div>

<div class="card">
<h3>Settings</h3>
<input id="kurs" value="2650">
<input id="ongkir" value="10">
<input id="expedisi" value="280000">
<input id="donasi" value="20000">
<input id="box" value="5000">
<input id="fee" value="23.5">
<input id="pajak" value="0.5">
</div>

<script>
function n(v){return Number((v||'').replace(/[^0-9]/g,''))||0;}
function rp(x){return 'Rp '+Math.round(x).toLocaleString('id-ID');}
function setKomisi(v){document.getElementById('komisi').value=v.toLocaleString('id-ID');}
function modalTotal(){
 let m=n(modal.value); if(m>0) return m;
 let r=n(rmb.value);
 return ((r+Number(ongkir.value))*Number(kurs.value))+Number(expedisi.value)+Number(donasi.value)+Number(box.value);
}
function profit(){
 let jualv=n(jual.value), kom=n(komisi.value), modalv=modalTotal();
 let market=jualv*(Number(fee.value)/100), tax=jualv*(Number(pajak.value)/100);
 let p=jualv-modalv-market-tax-kom;
 profitResult.innerHTML=`<b>Profit Bersih:</b> ${rp(p)}<br><b>Margin:</b> ${jualv?((p/jualv)*100).toFixed(2):0}%`;
}
function pricingTable(){
 let kom=n(komisi.value), modalv=modalTotal();
 let pct=(Number(fee.value)+Number(pajak.value))/100;
 let arr=[200000,250000,300000,350000,400000,450000,500000];
 let h='<table><tr><th>Profit</th><th>Harga Jual</th><th>Rekomendasi</th></tr>';
 arr.forEach(p=>{
   let jual=(p+modalv+kom)/(1-pct);
   let rec=Math.ceil(jual/50000)*50000-1000;
   h+=`<tr><td>${rp(p)}</td><td>${rp(jual)}</td><td>${rp(rec)}</td></tr>`;
 });
 h+='</table>';
 pricing.innerHTML=h;
}
function resetCalc(){['rmb','modal','komisi','jual'].forEach(i=>document.getElementById(i).value=''); profitResult.innerHTML=''; pricing.innerHTML='';}
</script>
</body></html>
